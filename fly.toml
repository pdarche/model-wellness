# fly.toml app configuration file generated for model-wellness on 2026-06-10
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'model-wellness'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  MW_DB_PATH = '/data/model_wellness.sqlite'
  MW_MODEL = 'claude-haiku-4-5-20251001'

[[mounts]]
  source = 'mw_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
